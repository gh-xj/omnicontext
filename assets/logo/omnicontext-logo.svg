<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">OmniContext Logo</title>
  <desc id="desc">OmniContext wordmark with layered context rings</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#1b365a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6bdcff"/>
      <stop offset="100%" stop-color="#88ffa8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="260" rx="20" fill="url(#bg)"/>
  <g transform="translate(80,130)">
    <circle r="56" fill="none" stroke="url(#ring)" stroke-width="10"/>
    <circle r="36" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.8"/>
    <circle r="16" fill="url(#ring)"/>
  </g>
  <text x="180" y="148" fill="#f4f9ff" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="78" font-weight="700" letter-spacing="1">OmniContext</text>
</svg>
