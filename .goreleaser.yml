version: 2

project_name: omnicontext

before:
  hooks:
    - go mod tidy

builds:
  - id: ocx
    main: ./cmd/ocx
    binary: ocx
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/gh-xj/omnicontext/internal/cli.Version={{.Version}} -X github.com/gh-xj/omnicontext/internal/cli.Commit={{.ShortCommit}} -X github.com/gh-xj/omnicontext/internal/cli.Date={{.Date}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - name: ocx
    repository:
      owner: gh-xj
      name: homebrew-tap
    homepage: https://github.com/gh-xj/omnicontext
    description: Local-first context memory and verification-loop CLI
    license: Apache-2.0
    test: |
      system "#{bin}/ocx", "version"
